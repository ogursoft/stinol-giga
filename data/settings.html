<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Настройки — Stinol-Giga</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-4">
    <h1>Настройки</h1>
    <form id="settingsForm" class="needs-validation" novalidate>
      <div class="mb-3">
        <label class="form-label">Целевая температура (°C)</label>
        <input type="number" step="0.1" class="form-control" name="temp_target" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Гистерезис (°C)</label>
        <input type="number" step="0.1" class="form-control" name="hysteresis" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Яркость LED (%)</label>
        <input type="number" min="0" max="100" class="form-control" name="led_brightness" required>
      </div>
      <button type="submit" class="btn btn-primary">Сохранить</button>
      <a href="/" class="btn btn-secondary">Назад</a>
    </form>
  </div>

  <script>
    async function loadSettings() {
      const res = await fetch('/api/settings');
      if (res.ok) {
        const data = await res.json();
        for (let key in data) {
          if (document.getElementsByName(key)[0]) {
            document.getElementsByName(key)[0].value = data[key];
          }
        }
      }
    }

    document.getElementById("settingsForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const obj = {};
      for (let [key, value] of formData) obj[key] = value;

      const res = await fetch("/api/settings", { method: "POST", headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(obj) });
      if (res.ok) {
        alert("Настройки сохранены!");
      } else {
        alert("Ошибка");
      }
    });

    loadSettings();
  </script>
</body>
</html>
