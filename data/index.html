<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stinol-Giga</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-4">
    <h1 class="text-center">Stinol-Giga</h1>
    <div class="card mb-3">
      <div class="card-body">
        <p><strong>Температура:</strong> <span id="temp">--</span> °C</p>
        <p><strong>Целевая:</strong> <span id="target">--</span> °C</p>
        <p><strong>Компрессор:</strong> <span id="comp" class="badge bg-secondary">-</span></p>
        <p><strong>Дверь:</strong> <span id="door" class="badge bg-secondary">-</span></p>
      </div>
    </div>
    <a href="/settings" class="btn btn-outline-primary">Настройки</a>
    <a href="/update" class="btn btn-outline-warning">OTA-обновление</a>
  </div>

  <script>
    setInterval(() => {
      fetch('/api/status').then(r => r.json()).then(data => {
        document.getElementById('temp').textContent = data.temp.toFixed(1);
        document.getElementById('target').textContent = data.target.toFixed(1);
        const comp = document.getElementById('comp');
        comp.textContent = data.compressor ? 'ВКЛ' : 'ВЫКЛ';
        comp.className = data.compressor ? 'badge bg-danger' : 'badge bg-success';

        const dr = document.getElementById('door');
        dr.textContent = data.door ? 'ОТКРЫТА' : 'ЗАКРЫТА';
        dr.className = data.door ? 'badge bg-warning' : 'badge bg-success';
      });
    }, 2000);
  </script>
</body>
</html>
